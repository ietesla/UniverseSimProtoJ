<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Starscape</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #020008;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }
  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }
  #hover-zone {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 220px;
    height: 660px;
    z-index: 10;
  }
  #controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 196px;
    display: flex;
    flex-direction: column;
    gap: 0;
    opacity: 0;
    transform: translateX(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    background: rgba(4, 2, 18, 0.82);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.06);
  }
  #hover-zone:hover #controls {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  .ctrl-section {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .ctrl-section + .ctrl-section {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .ctrl-heading {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(160,180,255,0.5);
    user-select: none;
    margin-bottom: 8px;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 30px;
    padding: 0 2px;
  }
  .toggle-row.sub-row {
    padding-left: 14px;
  }
  .toggle-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.55);
    user-select: none;
    cursor: pointer;
    transition: color 0.2s;
    white-space: nowrap;
  }
  .toggle-label:hover { color: rgba(255,255,255,0.85); }
  .toggle {
    position: relative;
    width: 34px;
    height: 18px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    border-radius: 9px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    transition: background 0.2s, border-color 0.2s;
  }
  .toggle input:checked + .toggle-track {
    background: rgba(120,160,255,0.35);
    border-color: rgba(140,180,255,0.55);
  }
  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.35);
    transition: transform 0.2s, background 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb {
    transform: translateX(16px);
    background: rgba(200,220,255,0.95);
  }
  #btn-randomize {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(180,200,255,0.65);
    background: rgba(120,150,255,0.08);
    border: 1px solid rgba(140,170,255,0.2);
    border-radius: 6px;
    padding: 6px 0;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    white-space: nowrap;
    width: 100%;
    margin-top: 6px;
  }
  #btn-randomize:hover {
    color: rgba(220,235,255,0.9);
    border-color: rgba(160,190,255,0.4);
    background: rgba(120,150,255,0.15);
  }
  #btn-randomize:active {
    background: rgba(120,150,255,0.22);
    transform: scale(0.98);
  }
  #scroll-speed-row {
    display: none;
    flex-direction: column;
    gap: 6px;
    padding: 4px 2px 2px;
  }
  #scroll-speed-row.visible { display: flex; }
  .slider-label {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(255,255,255,0.35);
    user-select: none;
    white-space: nowrap;
  }
  #sld-speed, #sld-trail {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
    cursor: pointer;
  }
  #sld-speed::-webkit-slider-thumb, #sld-trail::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: rgba(200,220,255,0.9);
    border: none;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
  }
  #sld-speed::-webkit-slider-thumb:hover, #sld-trail::-webkit-slider-thumb:hover { background: #fff; transform: scale(1.2); }
  #sld-speed::-moz-range-thumb, #sld-trail::-moz-range-thumb {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: rgba(200,220,255,0.9);
    border: none;
    cursor: pointer;
  }
  .theme-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    margin-bottom: 2px;
  }
  .theme-btn {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 5px;
    padding: 5px 4px;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    white-space: nowrap;
    text-align: center;
  }
  .theme-btn:hover {
    color: rgba(255,255,255,0.75);
    border-color: rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
  }
  .theme-btn.active {
    color: rgba(220,235,255,0.95);
    border-color: rgba(140,180,255,0.5);
    background: rgba(120,150,255,0.18);
  }
  .rgb-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 3px;
    border-radius: 2px;
    background: rgba(255,255,255,0.12);
    outline: none;
    cursor: pointer;
  }
  .rgb-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: rgba(200,220,255,0.9);
    border: none;
    cursor: pointer;
  }
  .rgb-slider::-moz-range-thumb {
    width: 13px; height: 13px;
    border-radius: 50%;
    background: rgba(200,220,255,0.9);
    border: none;
    cursor: pointer;
  }
  .theme-btn[data-theme="rainbow"] {
    background: linear-gradient(135deg,
      rgba(255,80,80,0.15), rgba(255,180,0,0.15), rgba(80,255,80,0.15),
      rgba(0,180,255,0.15), rgba(160,80,255,0.15));
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7);
  }
  .theme-btn[data-theme="rainbow"]:hover,
  .theme-btn[data-theme="rainbow"].active {
    background: linear-gradient(135deg,
      rgba(255,80,80,0.3), rgba(255,180,0,0.3), rgba(80,255,80,0.3),
      rgba(0,180,255,0.3), rgba(160,80,255,0.3));
    border-color: rgba(255,255,255,0.45);
    color: rgba(255,255,255,0.95);
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hover-zone">
<div id="controls">

  <!-- Colors -->
  <div class="ctrl-section">
    <div class="ctrl-heading">Colors</div>
    <div class="theme-grid">
      <button class="theme-btn active" data-theme="white">White</button>
      <button class="theme-btn" data-theme="default">Default</button>
      <button class="theme-btn" data-theme="aurora">Aurora</button>
      <button class="theme-btn" data-theme="ember">Ember</button>
      <button class="theme-btn" data-theme="void">Void</button>
      <button class="theme-btn" data-theme="rose">Rose</button>
      <button class="theme-btn" data-theme="toxic">Toxic</button>
      <button class="theme-btn" data-theme="rainbow">Rainbow</button>
      <button class="theme-btn" data-theme="custom">Custom</button>
    </div>
    <div id="custom-rgb" style="display:none; flex-direction:column; gap:6px; margin-top:6px;">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="slider-label" style="color:rgba(255,120,120,0.7)">R</span>
        <span class="slider-label" id="rgb-r-val">255</span>
      </div>
      <input type="range" class="rgb-slider" id="sld-r" min="0" max="255" value="255">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="slider-label" style="color:rgba(120,255,120,0.7)">G</span>
        <span class="slider-label" id="rgb-g-val">255</span>
      </div>
      <input type="range" class="rgb-slider" id="sld-g" min="0" max="255" value="255">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="slider-label" style="color:rgba(120,160,255,0.7)">B</span>
        <span class="slider-label" id="rgb-b-val">255</span>
      </div>
      <input type="range" class="rgb-slider" id="sld-b" min="0" max="255" value="255">
    </div>
  </div>

  <!-- Visuals -->
  <div class="ctrl-section">
    <div class="ctrl-heading">Visuals</div>
    <div class="toggle-row">
      <label class="toggle-label" for="tog-galaxies">Galaxies</label>
      <label class="toggle">
        <input type="checkbox" id="tog-galaxies">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <label class="toggle-label" for="tog-constellations">Constellations</label>
      <label class="toggle">
        <input type="checkbox" id="tog-constellations">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div id="zip-row" style="display:none">
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-zip">↳ Zippers</label>
        <label class="toggle">
          <input type="checkbox" id="tog-zip">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
    <div class="toggle-row">
      <label class="toggle-label" for="tog-events">Events</label>
      <label class="toggle">
        <input type="checkbox" id="tog-events">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div id="events-sub-row" style="display:none">
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-satellites">↳ Satellites</label>
        <label class="toggle">
          <input type="checkbox" id="tog-satellites">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-comets">↳ Comets</label>
        <label class="toggle">
          <input type="checkbox" id="tog-comets">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-supernovae">↳ Supernovae</label>
        <label class="toggle">
          <input type="checkbox" id="tog-supernovae">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-nebulas">↳ Nebulas</label>
        <label class="toggle">
          <input type="checkbox" id="tog-nebulas">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>
  </div>

  <!-- Interaction -->
  <div class="ctrl-section">
    <div class="ctrl-heading">Interaction</div>
    <div class="toggle-row">
      <label class="toggle-label" for="tog-drawing">Drawing</label>
      <label class="toggle">
        <input type="checkbox" id="tog-drawing">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div id="drawing-sub-row" style="display:none">
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-flash">↳ Flash</label>
        <label class="toggle">
          <input type="checkbox" id="tog-flash">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row sub-row">
        <label class="toggle-label" for="tog-connect">↳ Connect</label>
        <label class="toggle">
          <input type="checkbox" id="tog-connect">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div id="trail-life-row" style="display:flex; flex-direction:column; gap:6px; padding: 4px 2px 2px 14px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <span class="slider-label">↳ Trail</span>
          <span class="slider-label" id="trail-life-val">4s</span>
        </div>
        <input type="range" id="sld-trail" min="0.5" max="12" value="4.2" step="0.5">
      </div>
    </div>
    <button id="btn-randomize">↺ Randomize All</button>
  </div>

  <!-- Movement -->
  <div class="ctrl-section">
    <div class="ctrl-heading">Movement</div>
    <div class="toggle-row">
      <label class="toggle-label" for="tog-mouselook">Mouse Look</label>
      <label class="toggle">
        <input type="checkbox" id="tog-mouselook" checked>
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div class="toggle-row">
      <label class="toggle-label" for="tog-scroll">Scroll</label>
      <label class="toggle">
        <input type="checkbox" id="tog-scroll">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>
    </div>
    <div id="scroll-speed-row">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="slider-label">Speed</span>
        <span class="slider-label" id="scroll-speed-val">3</span>
      </div>
      <input type="range" id="sld-speed" min="-10" max="10" value="3" step="0.5">
    </div>
  </div>

</div>
</div>

<!--
  Load order matters — each file depends on globals from the ones above it:
  canvas.js     → W, H, ctx
  themes.js     → THEMES, getCurrent, applyTheme, tickThemeTransition, themeT
  stars.js      → STAR_COLORS, LAYERS, makeStars, makeCosmicMist, rippleBoost, rng, pick
  constellations.js → makeConstellations, drawConstellations
  galaxies.js   → makeGalaxies, makeNebulaClouds, drawGalaxy
  events.js     → comets, spawnComet, drawComet, supernovae, satellites, tickEvents
  interaction.js → ripples, tickRipples, heldFlashes, tickHeldStar, mouseHeld, heldX, heldY, TRAIL_LIFE
  controls.js   → opt* flags, scrollSpeed, randomize button
  draw.js       → main loop, references everything above
-->
<script src="canvas.js"></script>
<script src="themes.js"></script>
<script src="stars.js"></script>
<script src="constellations.js"></script>
<script src="galaxies.js"></script>
<script src="events.js"></script>
<script src="interaction.js"></script>
<script src="controls.js"></script>
<script src="draw.js"></script>

</body>
</html>
